<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global State Store (Redux Simulation)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 40px;
            margin: 0;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* Login Page Style */
        .login-wrap {
            max-width: 350px;
            margin: 80px auto;
            text-align: center;
        }
        .login-wrap h1 {
            color: #333;
            margin-bottom: 6px;
        }
        .sub-text {
            color: #666;
            margin-bottom: 35px;
        }
        .login-wrap input {
            display: block;
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 12px 6px;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
        }
        .login-btn {
            border: 2px solid #e83e8c;
            color: #e83e8c;
            background: transparent;
            padding: 11px 32px;
            font-size: 16px;
            border-radius: 3px;
            cursor: pointer;
            margin: 20px 0 30px;
        }
        .register-text {
            color: #666;
        }
        .register-link {
            color: #e83e8c;
            cursor: pointer;
        }
        .user-info-bar {
            background:#f0f0f0;
            padding:10px 20px;
            margin-bottom:20px;
        }

        /* User List Page Style */
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .table-inp {
            padding: 8px 10px;
            font-size: 16px;
            width: 160px;
        }
        .add-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 2px;
        }
        table {
            border-collapse: collapse;
            width: 750px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }
        tr:nth-child(even) {
            background-color: #f8f8f8;
        }
        .del-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
<!-- Login Page -->
<div id="page-login" class="page active">
    <div class="login-wrap">
        <h1>Welcome</h1>
        <div class="sub-text">Login to get started!</div>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="login-btn" id="btn-login">Login</button>
        <div class="register-text">First time here? <span class="register-link">Create your account.</span></div>
    </div>
</div>

<!-- User Management Page -->
<div id="page-user" class="page">
    <div class="user-info-bar">
        Logged-in User: <span id="current-user-display">Not logged in</span>
    </div>

    <div class="form-row">
        <button class="add-btn" id="addUserBtn">Add User</button>
        <input class="table-inp" id="firstName" placeholder="FirstName">
        <input class="table-inp" id="lastName" placeholder="LastName">
        <input class="table-inp" id="email" placeholder="Email">
    </div>

    <h2>Users</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>Id</th>
                <th>FirstName</th>
                <th>LastName</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
// ======================
// Simulate Redux Store (Root store, two state modules)
// ======================
const Store = {
    // State (similar to root reducer, two slices: auth user + user list)
    state: {
        authUser: null,
        userList: [
            { id: 1, firstName: "John", lastName: "Doe", email: "john@gmail.com" },
            { id: 2, firstName: "Dhiraj", lastName: "Ray", email: "only2dhir@gmail.com" }
        ]
    },
    subscribers: [],

    subscribe(callback) {
        this.subscribers.push(callback);
    },
    setState(newPartialState) {
        this.state = { ...this.state, ...newPartialState };
        this.subscribers.forEach(cb => cb(this.state));
    },
    getState() {
        return this.state;
    }
};

// ======================
// Action Type Constants (same as Redux action types)
// ======================
const ACTION_TYPES = {
    LOGIN_SET_USER: "LOGIN_SET_USER",
    LOGOUT_CLEAR_USER: "LOGOUT_CLEAR_USER",
    USERLIST_ADD: "USERLIST_ADD",
    USERLIST_DELETE: "USERLIST_DELETE"
};

// ======================
// Action Creator Functions
// ======================
const Actions = {
    setAuthUser(user) {
        return { type: ACTION_TYPES.LOGIN_SET_USER, payload: user };
    },
    clearAuthUser() {
        return { type: ACTION_TYPES.LOGOUT_CLEAR_USER };
    },
    addUser(userObj) {
        return { type: ACTION_TYPES.USERLIST_ADD, payload: userObj };
    },
    deleteUser(userId) {
        return { type: ACTION_TYPES.USERLIST_DELETE, payload: userId };
    }
};

// ======================
// Root Reducer (combine two sub-reducers like combineReducers)
// ======================
function rootReducer(state, action) {
    switch (action.type) {
        case ACTION_TYPES.LOGIN_SET_USER:
            return { ...state, authUser: action.payload };
        case ACTION_TYPES.LOGOUT_CLEAR_USER:
            return { ...state, authUser: null };
        case ACTION_TYPES.USERLIST_ADD:
            return { ...state, userList: [...state.userList, action.payload] };
        case ACTION_TYPES.USERLIST_DELETE:
            return {
                ...state,
                userList: state.userList.filter(item => item.id !== action.payload)
            };
        default:
            return state;
    }
}

// Dispatch action to reducer
function dispatch(action) {
    const updatedState = rootReducer(Store.getState(), action);
    Store.setState(updatedState);
}

// ======================
// UI Render Function (auto re-render on store change)
// ======================
function render(state) {
    // Render logged user info
    const userDisplay = document.getElementById("current-user-display");
    if (state.authUser) {
        userDisplay.textContent = state.authUser.email;
    } else {
        userDisplay.textContent = "Not logged in";
    }

    // Render user table
    const tbody = document.querySelector("#usersTable tbody");
    tbody.innerHTML = "";
    state.userList.forEach(item => {
        const tr = document.createElement("tr");
        tr.dataset.id = item.id;
        tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.firstName}</td>
            <td>${item.lastName}</td>
            <td>${item.email}</td>
            <td><button class="del-btn">Delete</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// Subscribe render to store updates
Store.subscribe(render);
// Initial page render
render(Store.getState());

// ======================
// Page Switch Logic
// ======================
function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}

// Predefined valid accounts
const validAccounts = [
    { email: "test@gmail.com", password: "123456" },
    { email: "admin@gmail.com", password: "123456" }
];

// Login Button Click
document.getElementById("btn-login").addEventListener("click", () => {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-pass").value.trim();

    const matchedUser = validAccounts.find(acc => acc.email === email && acc.password === password);
    if (matchedUser) {
        dispatch(Actions.setAuthUser(matchedUser));
        showPage("page-user");
    } else {
        alert("Incorrect email or password");
    }
});

// Add New User Button
document.getElementById("addUserBtn").addEventListener("click", () => {
    const fName = document.getElementById("firstName").value.trim();
    const lName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    if (!fName || !lName || !email) return;

    const currentState = Store.getState();
    const newId = currentState.userList.length > 0
        ? Math.max(...currentState.userList.map(u => u.id)) + 1
        : 1;

    dispatch(Actions.addUser({ id: newId, firstName: fName, lastName: lName, email }));

    // Clear input fields
    document.getElementById("firstName").value = "";
    document.getElementById("lastName").value = "";
    document.getElementById("email").value = "";
});

// Delete User Event Delegation
document.querySelector("#usersTable tbody").addEventListener("click", (e) => {
    if (e.target.classList.contains("del-btn")) {
        const rowId = Number(e.target.closest("tr").dataset.id);
        dispatch(Actions.deleteUser(rowId));
    }
});
</script>
</body>
</html>
