<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        input {
            padding: 8px 10px;
            font-size: 16px;
            width: 160px;
        }
        button.add-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 2px;
        }
        table {
            border-collapse: collapse;
            width: 750px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #ffffff;
        }
        tr:nth-child(even) {
            background-color: #f8f8f8;
        }
        button.del-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <!-- Форма добавления пользователя -->
    <div class="form-row">
        <button class="add-btn" id="addUserBtn">Add User</button>
        <input type="text" id="firstName" placeholder="FirstName">
        <input type="text" id="lastName" placeholder="LastName">
        <input type="email" id="email" placeholder="Email">
    </div>

    <h2>Users</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>Id</th>
                <th>FirstName</th>
                <th>LastName</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr data-id="1">
                <td>1</td>
                <td>John</td>
                <td>Doe</td>
                <td>john@gmail.com</td>
                <td><button class="del-btn">Delete</button></td>
            </tr>
            <tr data-id="2">
                <td>2</td>
                <td>Dhiraj</td>
                <td>Ray</td>
                <td>only2dhir@gmail.com</td>
                <td><button class="del-btn">Delete</button></td>
            </tr>
        </tbody>
    </table>

    <script>
        let nextId = 3;
        const tableBody = document.querySelector('#usersTable tbody');
        const addBtn = document.getElementById('addUserBtn');
        const firstNameInp = document.getElementById('firstName');
        const lastNameInp = document.getElementById('lastName');
        const emailInp = document.getElementById('email');

        // Добавить пользователя
        addBtn.addEventListener('click', () => {
            const fName = firstNameInp.value.trim();
            const lName = lastNameInp.value.trim();
            const mail = emailInp.value.trim();
            if (!fName || !lName || !mail) return;

            const row = document.createElement('tr');
            row.dataset.id = nextId;
            row.innerHTML = `
                <td>${nextId}</td>
                <td>${fName}</td>
                <td>${lName}</td>
                <td>${mail}</td>
                <td><button class="del-btn">Delete</button></td>
            `;
            tableBody.appendChild(row);

            // Очистить поля
            firstNameInp.value = '';
            lastNameInp.value = '';
            emailInp.value = '';
            nextId++;
        });

        // Удаление строки (делегирование события)
        tableBody.addEventListener('click', (e) => {
            if (e.target.classList.contains('del-btn')) {
                e.target.closest('tr').remove();
            }
        });
    </script>
</body>
</html>
